<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Admin - Hantera Lager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Admin: Hantera Produkter</h1>
        <a href="index.html" style="color: #3d5afe; text-decoration: none;">← Tillbaka till butiken</a>
    </header>

    <main style="padding: 2rem;">
        <section class="admin-section">
            <h2>Lägg till ny produkt i MySQL</h2>
            <form id="product-form">
                <div class="form-group">
                    <label for="title">Produktnamn:</label>
                    <input type="text" id="title" placeholder="Ex: Gamingmus Pro" required>
                </div>
                <div class="form-group">
                    <label for="description">Beskrivning:</label>
                    <textarea id="description" placeholder="Beskriv produkten..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="price">Pris (kr):</label>
                    <input type="number" id="price" placeholder="Ex: 599" required>
                </div>
                <div class="form-group">
                    <label for="image_url">Bild-länk:</label>
                    <input type="text" id="image_url" placeholder="Ex: images/mus.jpg">
                </div>
                <button type="submit">Spara produkt i databasen</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
